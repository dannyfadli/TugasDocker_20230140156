<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Home</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
        }
        .nav {
            background: black;
            padding: 15px;
        }
        .nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }
        .container {
            padding: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th {
            background: #1976d2;
            color: white;
            padding: 10px;
        }
        td {
            padding: 10px;
            text-align: center;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

<div class="nav">
    <a href="/home">Home</a>
    <a href="/form">Input Data</a>
    <a href="/">Logout</a>
</div>

<div class="container">
    <h2>MY Website 20230140156</h2>
    <p>Selamat datang di aplikasi</p>

    <a href="/form">+ Input Data Mahasiswa</a>

    <h3>Data Mahasiswa</h3>

    <table>
        <tr>
            <th>No</th>
            <th>Nama</th>
            <th>NIM</th>
            <th>Jenis Kelamin</th>
        </tr>

        <!-- jika kosong -->
        <tr th:if="${list.size() == 0}">
            <td colspan="4">Belum ada data</td>
        </tr>

        <!-- loop data -->
        <tr th:each="mhs, iterStat : ${list}">
            <td th:text="${iterStat.count}"></td>
            <td th:text="${mhs.nama}"></td>
            <td th:text="${mhs.nim}"></td>
            <td th:text="${mhs.jk}"></td>
        </tr>
    </table>
</div>

</body>
</html>
